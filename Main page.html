<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Portfolio</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #d1edbe;
        }

        h1 {
            margin-top: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 80px;
            flex-wrap: wrap;
        }

        .card {
            width: 250px;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            padding: 15px;
        }

        a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

    <h1>Select Your Portfolio</h1>

    <div class="container">

        <a href="portfolio1.html">
            <div class="card">
                <img src="IMG_20250729_085922.jpg" alt="IMG_20250729_085922">
                <h3>Portfolio 1</h3>
            </div>
        </a>

        <a href="portfolio2.html">
            <div class="card">
                <img src="AAfreen.jpeg" alt="AAfreen">
                <h3>Portfolio 2</h3>
            </div>
        </a>

    </div>

</body>
</html>
